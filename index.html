<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>XP CHECK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#070707;
color:white;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.title{
text-align:center;
font-size:40px;
font-weight:bold;
margin-top:20px;
}

.sub{
text-align:center;
color:#888;
margin-bottom:40px;
}

.question{
background:#111;
padding:25px;
border-radius:20px;
margin-bottom:25px;
border:1px solid #222;
}

.question h2{
font-size:20px;
margin-bottom:20px;
}

.option{
background:#1b1b1b;
padding:15px;
border-radius:12px;
margin-bottom:12px;
cursor:pointer;
transition:0.2s;
border:1px solid transparent;
}

.option:hover{
border:1px solid white;
transform:scale(1.02);
}

.selected{
background:white;
color:black;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

.result{
display:none;
background:#111;
padding:30px;
border-radius:20px;
margin-top:30px;
text-align:center;
}

.score{
font-size:80px;
font-weight:bold;
margin:20px 0;
}

.tag{
font-size:24px;
margin-bottom:10px;
}

.desc{
color:#aaa;
line-height:1.6;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
XP CHECK
</div>

<div class="sub">
选择选项开始检测
</div>

<div id="questions"></div>

<button onclick="finishTest()">
开始检测
</button>

<div class="result" id="result">

<div class="tag" id="tag"></div>

<div class="score" id="score"></div>

<div class="desc" id="desc"></div>

</div>

</div>

<script>

const data = [

{
title:"你最喜欢的角色类型？",
options:[
["高冷",20],
["病娇",40],
["温柔",10],
["疯批",50]
]
},

{
title:"你喜欢什么关系？",
options:[
["纯爱",10],
["强制爱",50],
["相爱相杀",40],
["日常陪伴",20]
]
},

{
title:"你的理想约会？",
options:[
["看电影",10],
["深夜散步",20],
["地下室囚禁",50],
["海边旅行",15]
]
}

];

const answers = [];

const container =
document.getElementById("questions");

data.forEach((q,index)=>{

const div =
document.createElement("div");

div.className = "question";

let html =
`<h2>${index+1}. ${q.title}</h2>`;

q.options.forEach((op,i)=>{

html += `
<div class="option"
onclick="selectOption(${index},${i},this)">
${op[0]}
</div>
`;

});

div.innerHTML = html;

container.appendChild(div);

});

function selectOption(qIndex,oIndex,el){

const parent =
el.parentElement;

const options =
parent.querySelectorAll(".option");

options.forEach(o=>{
o.classList.remove("selected");
});

el.classList.add("selected");

answers[qIndex] =
data[qIndex].options[oIndex][1];

}

function finishTest(){

if(answers.length < data.length){

alert("还有题目没选");

return;

}

let total = 0;

answers.forEach(v=>{
total += v;
});

let tag = "";
let desc = "";

if(total >= 120){

tag = "危险级XP";
desc =
"你的XP已经进入危险区域。建议重点观察。";

}else if(total >= 80){

tag = "高浓度XP";
desc =
"你有明显特殊XP倾向。";

}else if(total >= 40){

tag = "普通XP";
desc =
"属于正常范围。";

}else{

tag = "纯爱战士";
desc =
"你的XP十分健康。";

}

document.getElementById("result")
.style.display = "block";

document.getElementById("score")
.innerText = total;

document.getElementById("tag")
.innerText = tag;

document.getElementById("desc")
.innerText = desc;

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

}

</script>

</body>
</html>
