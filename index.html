<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XP CHECK</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#070707;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:#111;
      border:1px solid #2a2a2a;
      border-radius:24px;
      padding:30px;
      box-shadow:0 0 40px rgba(255,255,255,0.05);
    }

    h1{
      text-align:center;
      margin-bottom:10px;
      font-size:36px;
      letter-spacing:3px;
    }

    .sub{
      text-align:center;
      color:#888;
      margin-bottom:30px;
    }

    input{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#1b1b1b;
      color:white;
      font-size:16px;
      outline:none;
      margin-bottom:20px;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:white;
      color:black;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.02);
    }

    .loading{
      display:none;
      text-align:center;
      margin-top:25px;
      color:#999;
    }

    .result{
      display:none;
      margin-top:30px;
      padding:20px;
      background:#1a1a1a;
      border-radius:18px;
      text-align:center;
      animation:show 0.4s ease;
    }

    .score{
      font-size:72px;
      font-weight:bold;
      margin:10px 0;
    }

    .tag{
      display:inline-block;
      margin-top:10px;
      padding:8px 16px;
      border-radius:999px;
      background:#2b2b2b;
      color:#fff;
      font-size:14px;
    }

    @keyframes show{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>XP CHECK</h1>
    <div class="sub">
      输入名字开始检测
    </div>

    <input id="nameInput" type="text" placeholder="输入名字..." />

    <button onclick="startCheck()">
      开始检测
    </button>

    <div class="loading" id="loading">
      正在扫描XP...
    </div>

    <div class="result" id="result">
      <div id="resultName"></div>

      <div class="score" id="score">
        98%
      </div>

      <div class="tag" id="tag">
        危险级XP
      </div>
    </div>
  </div>

  <script>
    function startCheck(){

      const name =
        document.getElementById("nameInput").value;

      if(!name){
        alert("请输入名字");
        return;
      }

      const loading =
        document.getElementById("loading");

      const result =
        document.getElementById("result");

      loading.style.display = "block";
      result.style.display = "none";

      setTimeout(()=>{

        loading.style.display = "none";

        const score =
          Math.floor(Math.random()*100)+1;

        let tag = "";

        if(score > 85){
          tag = "顶级XP";
        }else if(score > 60){
          tag = "危险XP";
        }else if(score > 30){
          tag = "普通XP";
        }else{
          tag = "隐藏XP";
        }

        document.getElementById("resultName")
          .innerText = name + " 的XP值";

        document.getElementById("score")
          .innerText = score + "%";

        document.getElementById("tag")
          .innerText = tag;

        result.style.display = "block";

      },2000);
    }
  </script>

</body>
</html>
